<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rafiq — Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  :root {
    --paper: #F1F3EF;
    --ink: #17242B;
    --slate: #5C6B68;
    --teal: #1F6E66;
    --forest: #3C7A4A;
    --amber: #C97A26;
    --brick: #B6452F;
    --border: #D6DAD2;
    --bubble-user: #E4E8E1;
    --nav: #131A22;
    --nav-light: #232F3E;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--nav);
    border-bottom: 3px solid var(--amber);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 22px;
    height: 22px;
    color: var(--amber);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 17px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--paper);
    line-height: 1.2;
  }

  .brand .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: block;
  }

  .catalog-tag {
    margin-top: 10px;
    font-size: 11px;
    color: var(--slate);
    opacity: 0.75;
  }

  #voice-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--nav-light);
    border: 1px solid #2E3D4F;
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    color: #B8C2CC;
    font-size: 13px;
    color: var(--slate);
    transition: border-color 0.15s ease;
  }

  #voice-toggle.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(201,122,38,0.12);
  }

  #voice-toggle svg { width: 14px; height: 14px; }

  main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  .empty-state {
    margin: auto 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--slate);
  }

  .row { display: flex; flex-direction: column; max-width: 82%; }
  .row.user { align-self: flex-end; align-items: flex-end; }
  .row.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
  }

  .row.user .bubble { background: var(--bubble-user); border-radius: 14px 14px 4px 14px; }
  .row.assistant .bubble { background: #FFFFFF; border: 1px solid var(--border); border-radius: 14px 14px 14px 4px; }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--slate);
  }

  .badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .badge.knowledge { background: rgba(31,110,102,0.12); color: var(--teal); }
  .badge.resolved { background: rgba(60,122,74,0.12); color: var(--forest); }
  .badge.escalated { background: rgba(182,69,47,0.12); color: var(--brick); }
  .badge.clarifying { background: rgba(201,122,38,0.12); color: var(--amber); }

  .products {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
    width: 100%;
  }

  .product-card {
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }

  .product-card:hover {
    border-color: var(--amber);
    background: #FFFBF4;
  }

  .product-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .product-title { font-size: 13px; font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .product-store { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--slate); }

  .product-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .product-price { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: var(--amber); }
  .product-rating { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--slate); }
  .product-rating .star { color: var(--amber); }

  .typing {
    display: flex;
    gap: 4px;
    padding: 14px 16px;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--slate);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }

  footer {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: center;
  }

  .input-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 720px;
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 6px 6px 18px;
  }

  .input-bar:focus-within { border-color: var(--teal); }

  #text-input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    background: transparent;
    color: var(--ink);
    padding: 8px 0;
  }

  #text-input::placeholder { color: var(--slate); }

  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .icon-btn svg { width: 18px; height: 18px; }
  .icon-btn:active { transform: scale(0.92); }

  #mic-button { background: var(--paper); color: var(--ink); }
  #mic-button.listening { background: var(--amber); color: var(--paper); animation: pulse 1.1s ease-in-out infinite; }
  #send-button { background: var(--teal); color: var(--paper); }
  #send-button:disabled { background: var(--border); color: var(--slate); cursor: default; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,122,38,0.35); }
    50% { box-shadow: 0 0 0 10px rgba(201,122,38,0); }
  }

  .browser-warning {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--brick);
    text-align: center;
    padding: 6px 0 0;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 8l-9-5-9 5 9 5 9-5z"></path>
      <path d="M3 8v8l9 5 9-5V8"></path>
      <path d="M12 13v8"></path>
    </svg>
    <div>
      <h1>Rafiq</h1>
      <span class="tag">Shopping &amp; support assistant</span>
    </div>
  </div>
  <button id="voice-toggle" class="active" aria-pressed="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
    </svg>
    <span id="voice-toggle-label">Voice replies on</span>
  </button>
</header>

<main id="transcript">
  <div class="empty-state" id="empty-state">
    Ask about an order, a return, a refund — or tell me what you're shopping for.
    <div class="catalog-tag">Real product catalog · Amazon Reviews 2023 dataset</div>
  </div>
</main>

<footer>
  <div class="input-bar">
    <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off" />
    <button id="mic-button" class="icon-btn" aria-label="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </button>
    <button id="send-button" class="icon-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</footer>
<div class="browser-warning" id="browser-warning" style="display:none;">Voice input needs Chrome's Web Speech API.</div>

<script>
  const transcript = document.getElementById('transcript');
  const emptyState = document.getElementById('empty-state');
  const textInput = document.getElementById('text-input');
  const sendButton = document.getElementById('send-button');
  const micButton = document.getElementById('mic-button');
  const voiceToggle = document.getElementById('voice-toggle');
  const voiceToggleLabel = document.getElementById('voice-toggle-label');

  let conversationHistory = [];
  let sessionContext = {};
  let voiceRepliesOn = true;
  let isSending = false;

  voiceToggle.addEventListener('click', () => {
    voiceRepliesOn = !voiceRepliesOn;
    voiceToggle.classList.toggle('active', voiceRepliesOn);
    voiceToggleLabel.textContent = voiceRepliesOn ? 'Voice replies on' : 'Voice replies off';
    if (!voiceRepliesOn) window.speechSynthesis.cancel();
  });

  function scrollToEnd() {
    transcript.scrollTop = transcript.scrollHeight;
  }

  function addUserTurn(text) {
    if (emptyState) emptyState.remove();
    const row = document.createElement('div');
    row.className = 'row user';
    row.innerHTML = `<div class="bubble"></div>`;
    row.querySelector('.bubble').textContent = text;
    transcript.appendChild(row);
    scrollToEnd();
  }

  function badgeFor(intent, escalate, needsClarification) {
    if (escalate) return { className: 'escalated', label: 'Escalated' };
    if (needsClarification) return { className: 'clarifying', label: 'Clarifying' };
    if (intent === 'knowledge_question') return { className: 'knowledge', label: 'Knowledge' };
    if (intent === 'shopping_query') return { className: 'knowledge', label: 'Shopping' };
    if (intent === 'chitchat_or_identity' || intent === 'off_topic') return { className: 'resolved', label: 'Rafiq' };
    return { className: 'resolved', label: 'Resolved' };
  }

  function renderProducts(products) {
    if (!products || products.length === 0) return '';
    const container = document.createElement('div');
    container.className = 'products';
    products.slice(0, 5).forEach(p => {
      const card = document.createElement('a');
      card.className = 'product-card';
      card.href = p.url || '#';
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      const rating = (typeof p.average_rating === 'number') ? p.average_rating.toFixed(1) : p.average_rating;
      const price = (typeof p.price === 'number') ? p.price.toFixed(2) : p.price;
      card.innerHTML = `
        <div class="product-info">
          <span class="product-title">${p.title}</span>
          <span class="product-store">${p.store}</span>
        </div>
        <div class="product-stats">
          <span class="product-price">$${price}</span>
          <span class="product-rating"><span class="star">&#9733;</span> ${rating} · ${p.rating_number}</span>
        </div>`;
      container.appendChild(card);
    });
    return container;
  }

  function addAssistantTurn(text, badgeInfo, products) {
    const row = document.createElement('div');
    row.className = 'row assistant';

    const metaRow = document.createElement('div');
    metaRow.className = 'meta-row';
    const badge = document.createElement('span');
    badge.className = 'badge ' + badgeInfo.className;
    badge.textContent = badgeInfo.label;
    metaRow.appendChild(badge);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(metaRow);
    row.appendChild(bubble);

    const productEl = renderProducts(products);
    if (productEl) row.appendChild(productEl);

    transcript.appendChild(row);
    scrollToEnd();
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'row assistant';
    row.id = 'typing-row';
    row.innerHTML = `<div class="bubble typing"><span></span><span></span><span></span></div>`;
    transcript.appendChild(row);
    scrollToEnd();
  }

  function hideTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function speak(text) {
    if (!voiceRepliesOn || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 1.0;
    window.speechSynthesis.speak(utterance);
  }

  async function sendMessage(message) {
    if (!message.trim() || isSending) return;
    isSending = true;
    sendButton.disabled = true;
    textInput.value = '';

    addUserTurn(message);
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message,
          history: conversationHistory.slice(-8),
          session_context: sessionContext,
        }),
      });
      const data = await res.json();
      hideTyping();
      addAssistantTurn(data.response, badgeFor(data.intent, data.escalate, data.needs_clarification), data.products);
      speak(data.response);

      conversationHistory.push({ role: 'user', content: message });
      conversationHistory.push({ role: 'assistant', content: data.response });
      sessionContext = data.session_context || {};
    } catch (err) {
      hideTyping();
      addAssistantTurn('Something went wrong reaching the server — is web/run.py running?', { className: 'escalated', label: 'Error' });
    } finally {
      isSending = false;
      sendButton.disabled = false;
      textInput.focus();
    }
  }

  sendButton.addEventListener('click', () => sendMessage(textInput.value));
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage(textInput.value);
  });

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('browser-warning').style.display = 'block';
    micButton.disabled = true;
    micButton.style.opacity = '0.4';
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => micButton.classList.add('listening');
    recognition.onend = () => micButton.classList.remove('listening');
    recognition.onerror = () => micButton.classList.remove('listening');
    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      sendMessage(text);
    };

    micButton.addEventListener('click', () => {
      window.speechSynthesis.cancel();
      recognition.start();
    });
  }

  textInput.focus();
</script>

</body>
</html>
